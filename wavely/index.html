<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wavely</title>
  <link rel="icon" href="/favicon.ico">
<link rel="icon" type="image/png" href="../images/signature.png" sizes="16x16">
<link rel="icon" type="image/png" href="../images/signature.png" sizes="32x32">

  <!-- Preload key images -->
  <link rel="preload" href="cover_bg.png" as="image">
  <link rel="preload" href="cover.png" as="image">

  <style>

    @font-face {
      font-family: 'SpecialElite';
      src: url('../fonts/SpecialElite-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'ShadowsIntoLight';
      src: url('../fonts/ShadowsIntoLight-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    :root{
      /* Fallback height before JS sets exact value */
      --cover-height: 900px;
      /* Aspect ratio used to reserve space for the cover image wrapper (adjust if needed) */
      --cover-aspect-w: 16;
      --cover-aspect-h: 9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { margin: 0; padding: 0; }
    body{
      font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #FFFFFF;
      color: #000000;
      line-height: 1.6;
      font-weight: 200;
      overflow-x: hidden;

      position: relative;
      display: flow-root; /* prevents top-margin collapse so background starts at top */
    }

    /* Custom Cursor */
    * {
      cursor: none !important;
    }

    .custom-cursor {
      position: fixed;
      top: 0;
      left: 0;
      width: 8px;
      height: 8px;
      background: #000;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.15s ease;
      transform: translate(-50%, -50%);
    }

    .custom-cursor.hover,
    .custom-cursor.click {
      transform: translate(-50%, -50%) scale(2);
    }

    .click-dot {
      position: absolute;
      width: 16px;
      height: 16px;
      background: #000;
      border-radius: 50%;
      pointer-events: none;
      opacity: 1;
      transform: translate(-50%, -50%);
      transition: opacity 0.2s ease;
      z-index: 9998;
    }

    .click-dot.fade-out {
      opacity: 0;
    }

    /* Top back icon bar (keep as-is; transparent) */
    nav{
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: 2rem 1rem;
      background: transparent;
      backdrop-filter: none;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      transition: all .3s ease;
    }
    .back-btn{
      color: #000;
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: 200;
      letter-spacing: .5px;
      transition: all .3s ease;
      display: flex; align-items: center;
    }
    .back-btn:hover{ opacity: .7; transform: translateX(-5px); }

    /* Full-page background behind the hero up to the divider */
    body::before{
      content:'';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: var(--cover-height); /* set at DOMContentLoaded */
      background: url('cover_bg.png') top center / cover no-repeat;
      z-index: -2; /* behind all content */
    }

    /* Layout containers */
    .container{
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem 4rem;
    }

    .white-content{
      background: transparent;
      padding-top: 4.5rem;
    }

    .work-hero{
      margin-bottom: 0;
      opacity: 0;
      animation: fadeInUp 1s ease .5s forwards;
      position: relative;
      background: transparent;
      padding-bottom: 4.5rem;
    }

    /* Reserve space for the cover image immediately (prevents first-paint jump)
       Adjust aspect ratio via --cover-aspect-w / --cover-aspect-h if needed. */
    .work-image.large{
      margin: 4rem 0 2rem 0;
      border-radius: 0;
      aspect-ratio: calc(var(--cover-aspect-w) / var(--cover-aspect-h));
    }
    .work-image{
      border-radius: 12px;
      overflow: hidden;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
    }
    .work-image img{
      width: 100%; height: auto; object-fit: contain;
      display: block;
    }

    .hero-content{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      margin-top: 5rem;
      align-items: start;
    }
    .hero-left{ display: flex; flex-direction: column; align-items: flex-start; gap: 1rem; }
    .work-subtitle{
      font-family: 'SF Pro', sans-serif;
      font-size: .8rem; font-weight: 300; margin: 0; font-style: italic;
    }
    .hero-right{ display: flex; justify-content: flex-end; }
    .work-title{
      font-family: 'SF Pro', sans-serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 400; margin: 0; line-height: 1.3; letter-spacing: -1px;
    }
    .work-meta{ display: flex; flex-direction: column; gap: 2rem; font-size: .8rem; opacity: .8; }
    .work-meta-row{ display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }
    .work-meta-item{ display: flex; flex-direction: column; gap: .5rem; }
    .work-meta-label{
      font-weight: 200; opacity: .6; font-size: .7rem; text-transform: uppercase; letter-spacing: 1px;
    }
    .work-meta-value{ font-weight: 300; font-size: .8rem; }

    .work-section{
      margin-bottom: 5rem;
      opacity: 0;
      transform: translateY(40px);
      transition: all .8s ease;
    }
    .work-section.visible{ opacity: 1; transform: translateY(0); }

    .work-section h2{
      font-family: 'ShadowsIntoLight','SF Pro',sans-serif;
      font-size: 2rem; font-weight: normal; margin-bottom: 2rem; color: #000; letter-spacing: .5px;
    }
    .work-section p{
      font-size: 14px; line-height: 22px; font-weight: 300; letter-spacing: 0.5px; margin-bottom: 1.5rem; max-width: 700px;
    }
    .work-section ul{
      font-size: 14px; line-height: 22px; font-weight: 300; letter-spacing: 0.5px;
    }
    .work-section h3{
      font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 1.2rem; font-weight: 400; margin-bottom: 1rem; color: #000;
    }

    .section-divider{
      width: 100%; height: 1px;
      background: rgba(0,0,0,.1);
      margin: 4.5rem 0;
    }

    /* Work in Progress */
    .wip-notice{
      font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #000000;
      font-size: 0.8rem;
      font-weight: 300;
      text-align: center;
      margin-bottom: 8rem;
    }

    /* Problem Title Section */
    .problem-title-section{
      text-align: center;
      margin-top: 12rem;
      margin-bottom: 14rem;
      max-width: 80%;
      margin-left: auto;
      margin-right: auto;
    }

    .problem-title-section.first-problem{
      margin-top: 6rem;
    }

    .problem-title-section.closer-text{
      margin-top: 16rem;
      margin-bottom: 2rem;
    }

    .problem-title-section p{
      margin: 0;
      font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 30px;
      line-height: 36px;
      font-weight: 400;
      color: #2a2a2a;
    }

    .problem-title-section img{
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* Research Section */
    .research-section{
      margin: 4rem 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .research-image{
      max-width: 80%;
      border-radius: 12px;
      overflow: hidden;
    }

    .research-image img{
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    /* Problem Items */
    .problem-item{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
      margin: 4rem 0;
      opacity: 0;
      transform: translateY(40px);
      transition: all .8s ease;
    }
    .problem-item.visible{ opacity: 1; transform: translateY(0); }
    .problem-item.reverse{ grid-template-columns: 1fr 1fr; }
    .problem-image-left, .problem-image-right{ display: flex; justify-content: center; }
    .problem-image-left img, .problem-image-right img{ width: 60%; height: auto; border-radius: 8px; }
    .problem-text-right, .problem-text-left{ display: flex; flex-direction: column; gap: 1rem; }
    .problem-text-right{ text-align: left; }
    .problem-text-left{ text-align: right; }
    .problem-text-right h3, .problem-text-left h3{
      font-size: 1.2rem; font-weight: 400; margin: 0; color: #000;
    }
    .problem-text-right p, .problem-text-left p{
      font-size: 14px; line-height: 18px; font-weight: 300; letter-spacing: 0.5px; color: #000; margin: 0;
    }

    /* Problem Analysis */
    .problem-analysis{
      margin: 4rem 0;
      display: grid;
      grid-template-columns: 1fr 500px 1fr;
      gap: .5rem;
      align-items: start;
    }
    .problem-left, .problem-right{
      display: flex; flex-direction: column; gap: .8rem; justify-content: flex-start; position: relative;
    }
    .problem-image{ display: flex; justify-content: center; align-items: flex-start; }
    .problem-image .work-image{ margin: 0; border-radius: 8px; max-width: 100%; width: 450px; }

    .problem-point{
      background: #FFF;
      border: 1px solid rgba(0,0,0,.1);
      border-radius: 20px;
      padding: 1rem;
      backdrop-filter: blur(10px);
      box-shadow: 0 2px 6px rgba(0,0,0,.05);
      width: 50%; aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center; position: relative;
    }
    .problem-left .problem-point:nth-child(1){ margin-left: 40%; z-index: 2; }
    .problem-left .problem-point:nth-child(2){ margin-left: 60%; margin-top: -30px; z-index: 1; }
    .problem-right .problem-point:nth-child(1){ margin-left: 30%; z-index: 2; }
    .problem-right .problem-point:nth-child(2){ margin-left: 0; margin-top: -25px; z-index: 3; }
    .problem-right .problem-point:nth-child(3){ margin-left: 15%; margin-top: -35px; z-index: 1; }
    .problem-point::before{ display: none; }
    .problem-point p{
      margin: 0; font-family: 'SF Pro', sans-serif; font-size: 14px; line-height: 18px; font-weight: 300; letter-spacing: 0.5px; color: #000; text-align: center;
    }

    /* Problem 2 */
    .problem2-section{ margin: 4rem 0; }
    .problem2-text{ margin-top: 8rem; margin-bottom: 2rem; }
    .problem2-text p{ font-size: 14px; line-height: 18px; font-weight: 300; letter-spacing: 0.5px; margin: 0; max-width: 400px; }
    .problem2-image{ display: flex; justify-content: center; align-items: center; }
    .problem2-image .work-image{ margin: 0; border-radius: 8px; max-width: 100%; width: 800px; }

    /* Solution */
    .solution-section{ margin: 4rem 0; }

    /* Solution row with text on left, images on right */
    .solution-row-left{
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 3rem; align-items: center; margin-bottom: 4rem;
      max-width: 115%;
      margin-left: -7.5%;
      margin-right: -7.5%;
    }
    .solution-row-left .solution-content{
      order: 1;
      text-align: right;
      display: flex;
      justify-content: flex-end;
    }
    .solution-row-left .solution-images{ order: 2; }

    /* Single image in solution-row-left should only take half width */
    .solution-row-left .solution-images:has(.solution-image:only-child){
      max-width: 50%;
      justify-content: flex-start;
    }

    /* Solution row with images on left, text on right */
    .solution-row-right{
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 3rem; align-items: center; margin-bottom: 4rem;
      max-width: 115%;
      margin-left: -7.5%;
      margin-right: -7.5%;
    }
    .solution-row-right .solution-images{ order: 1; }
    .solution-row-right .solution-content{ order: 2; }

    /* Single image in solution-row-right should only take half width */
    .solution-row-right .solution-images:has(.solution-image:only-child){
      max-width: 50%;
      justify-content: flex-start;
    }

    /* Solution row centered */
    .solution-row-center{
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 3rem;
      margin-bottom: 4rem;
      max-width: 115%;
      margin-left: -7.5%;
      margin-right: -7.5%;
    }

    .solution-row-center .solution-images{
      justify-content: center;
      max-width: 25%;
    }

    .solution-row-center .solution-content{
      max-width: 40%;
    }

    /* Solution row with full-width image grid */
    .solution-row-full{
      margin-bottom: 4rem;
      max-width: 115%;
      margin-left: -7.5%;
      margin-right: -7.5%;
    }

    .solution-row-full.closer{
      margin-bottom: 2rem;
    }

    .solution-row-full.full-bleed{
      max-width: 100vw;
      margin-left: calc(-50vw + 50%);
      margin-right: calc(-50vw + 50%);
      margin-bottom: 0;
    }

    .solution-row-full.full-bleed .solution-bottom-row{
      margin-bottom: 0;
    }

    .solution-top-row{
      display: flex;
      flex-direction: row;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .solution-top-row .solution-image{
      flex: 1;
    }

    .solution-bottom-row{
      width: 100%;
    }

    .solution-bottom-row .solution-image{
      width: 100%;
    }

    .solution-images{
      display: flex;
      flex-direction: row;
      gap: 1.5rem;
      align-items: flex-end;
    }

    .solution-image{
      border-radius: 0px;
      overflow: hidden;
      width: 100%;
    }

    .solution-image img{
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    .solution-content{
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .solution-item{ margin: 0; }
    .solution-item h3{
      font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 18px;
      line-height: 22px;
      font-weight: 400;
      letter-spacing: 0.5px;
      margin-bottom: .8rem;
      color: #000;
    }
    .solution-item p{ font-size: 14px; line-height: 18px; font-weight: 300; letter-spacing: 0.5px; color: #000; margin: 0; }

    /* Motion grid */
    .motion-grid{
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: repeat(4, 1fr);
      gap: 0; margin: 6rem 0; position: relative;
    }
    .motion-row{
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0; align-items: end; padding: 2.5rem 0; position: relative;
    }
    .motion-row::after{
      content: ''; position: absolute; top: 0; bottom: 0; left: 50%;
      width: 1px; background: rgba(0,0,0,.1); z-index: 1;
    }
    .motion-row:nth-child(even) .motion-gif{ order: 2; }
    .motion-row:nth-child(even) .motion-text{ order: 1; }
    .motion-gif{ display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
    .motion-gif img{ width: 90%; height: auto; border-radius: 8px; }
    .motion-row:nth-child(1) .motion-gif, .motion-row:nth-child(3) .motion-gif{ justify-content: flex-start; padding-left: 1rem; }
    .motion-row:nth-child(2) .motion-gif, .motion-row:nth-child(4) .motion-gif{ justify-content: flex-end; padding-right: 1rem; }
    .motion-text{ display: flex; flex-direction: column; justify-content: flex-end; gap: 1rem; padding: 0 3rem; }
    .motion-row:nth-child(even) .motion-text{ text-align: right; }
    .motion-text h3{
      font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 18px;
      line-height: 22px;
      font-weight: 400;
      letter-spacing: 0.5px;
      margin: 0;
      color: #000;
    }
    .motion-text p{ font-size: 14px; line-height: 18px; font-weight: 300; letter-spacing: 0.5px; color: #000; margin: 0; }

    /* Click Me Text */
    .click-me-text{
      text-align: center;
      margin-top: 4rem;
      margin-bottom: 1rem;
    }

    .click-me-text p{
      margin: 0;
      font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 18px;
      line-height: 22px;
      font-weight: 200;
      color: #000000;
      opacity: 1;
    }

    /* Figma */
    .figma-embed{
      display: flex; justify-content: center; align-items: center;
      margin: 0; padding: 0 2rem;
    }
    .figma-embed iframe{
      width: 100%;
      height: 800px;
      border-radius: 0;
      box-shadow: none;
    }

    /* Figma Link Button */
    .figma-link-container{
      text-align: center;
      margin-top: 12rem;
      margin-bottom: 4rem;
    }

    .figma-link-button{
      display: inline-block;
      font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 30px;
      line-height: 36px;
      font-weight: 400;
      color: #000000;
      text-decoration: none;
      padding: 1rem 2rem;
      border: 2px solid #000000;
      border-radius: 40px;
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }

    .figma-link-button:hover{
      background-color: #AE39F2;
      color: #FFFFFF;
      border-color: #AE39F2;
    }

    /* Project Navigation */
    .project-nav{
      padding: 4rem 0 2rem;
      margin-top: 6rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .project-nav:has(.next:only-child){
      justify-content: flex-end;
    }
    .project-nav a{
      color: #000000;
      text-decoration: none;
      font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 18px;
      line-height: 22px;
      font-weight: 400;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      padding: 1rem 0;
    }
    .project-nav a:hover{
      opacity: 0.7;
    }
    .project-nav .prev::before{
      content: '← ';
    }
    .project-nav .next::after{
      content: ' →';
    }

    /* Contact Block */
    .contact-block {
      border-top: 1px solid rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-start;
      padding: 0;
      padding-top: 4rem;
      background: transparent;
      transition: background-color 0.5s ease;
      position: relative;
      margin-top: 4rem;
      min-height: 330px;
    }

    .contact-block > * {
      position: relative;
      z-index: 1;
    }

    .contact-block .corner-art {
      position: absolute;
      right: -60px;
      bottom: -60px;
      width: 280px;
      height: auto;
      z-index: 0;
      pointer-events: none;
    }

    .contact-block:hover {
      background: transparent;
    }

    .contact-text-top {
      font-size: 30px;
      line-height: 36px;
      font-weight: 400;
      color: #000000;
    }

    .contact-bottom {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: flex-start;
    }

    .contact-text-bottom {
      font-size: 18px;
      line-height: 22px;
      font-weight: 400;
      color: #000000;
      letter-spacing: 0.5px;
    }

    .contact-icons {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .contact-icons a {
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease;
    }

    .contact-icons a:hover {
      opacity: 0.7;
    }

    .contact-icons img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-track { background: #FFF; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.3); border-radius: 1px; }

    /* Animations */
    @keyframes fadeInUp{
      from{ opacity: 0; transform: translateY(40px); }
      to{ opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 768px){
      nav{ padding: 1.5rem 1rem; }
      .container{ padding: 6rem 1rem 2rem; }
      .hero-content{ grid-template-columns: 1fr; gap: 2rem; margin-top: 2rem; }
      .hero-right{ justify-content: flex-start; }
      .work-meta-row{ grid-template-columns: 1fr; gap: 1.5rem; }
      .research-image{ max-width: 100%; }
      .problem-item{ grid-template-columns: 1fr; gap: 2rem; }
      .problem-item.reverse{ direction: ltr; }
      .problem-text-left{ text-align: right; }
      .problem-analysis{ grid-template-columns: 1fr; gap: 3rem; }
      .problem-image{ order: 1; padding-top: 0; }
      .problem-image .work-image{ width: 250px; }
      .problem-left{ order: 2; }
      .problem-right{ order: 3; }
      .problem-point{ max-width: 100%; }
      .problem2-image .work-image{ width: 90%; }
      .solution-row-left, .solution-row-right, .solution-row-center{ grid-template-columns: 1fr; gap: 2rem; }
      .solution-row-left .solution-content, .solution-row-right .solution-content{ order: 1; }
      .solution-row-left .solution-images, .solution-row-right .solution-images{ order: 2; }
      .motion-row{ grid-template-columns: 1fr; gap: 1rem; padding: 1.5rem 0; text-align: center; }
      .motion-row::after{ display: none; }
      .motion-row:nth-child(even) .motion-gif{ order: 1; }
      .motion-row:nth-child(even) .motion-text{ order: 2; text-align: center; }
      .motion-text{ padding: 0 1rem; }
      .motion-gif img{ max-width: 300px; }
      .project-nav{ flex-direction: column; gap: 1rem; text-align: center; }
    }
  </style>
</head>
<body>
  <!-- Custom Cursor -->
  <div class="custom-cursor"></div>

  <!-- Navigation -->
  <nav>
    <a href="../index.html" class="back-btn">←</a>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <!-- Hero Section -->
    <div class="work-hero">
      <div class="work-image large">
        <img src="cover.png" alt="Wavely Cover">
      </div>

      <div class="hero-content">
        <div class="hero-left">
          <h1 class="work-title">Wavely -<br>Designing a Smarter Coffee Chat Network</h1>
          <p class="work-subtitle">From cold DMs to weekly ripple conversations.</p>

  <script>
    // Reveal sections on scroll
    const sections = document.querySelectorAll('.work-section');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    sections.forEach(s => observer.observe(s));

    // Reveal problem items on scroll
    const problemItems = document.querySelectorAll('.problem-item');
    const problemObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    problemItems.forEach(item => problemObserver.observe(item));

    // Hide/show top nav on scroll
    let lastScrollY = window.scrollY;
    const nav = document.querySelector('nav');
    window.addEventListener('scroll', () => {
      const y = window.scrollY;
      if (y > lastScrollY && y > 100) nav.style.transform = 'translateY(-100%)';
      else nav.style.transform = 'translateY(0)';
      lastScrollY = y;
    });

    // Custom cursor
    (function cursor(){
      const cursor = document.querySelector('.custom-cursor');
      if(!cursor) return;

      document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top  = e.clientY + 'px';
      });

      const interactive = document.querySelectorAll('a, button, [role="button"]');
      interactive.forEach(el => {
        el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
      });

      const makeDot = (x, y) => {
        const dot = document.createElement('div');
        dot.className = 'click-dot';
        dot.style.left = x + 'px';
        dot.style.top  = y + 'px';
        document.body.appendChild(dot);
        setTimeout(() => dot.classList.add('fade-out'), 1000);
        setTimeout(() => dot.remove(), 4000);
      }

      document.addEventListener('mousedown', e => {
        cursor.classList.add('click');
        makeDot(e.pageX, e.pageY);
      });
      document.addEventListener('mouseup',   () => cursor.classList.remove('click'));
      document.addEventListener('mouseleave',() => {
        cursor.style.opacity = '0';
        cursor.classList.remove('click');
      });
      document.addEventListener('mouseenter',() => {
        cursor.style.opacity = '1';
      });
    })();

    // --- Set cover height EARLY to stop first-paint jump ---
    function setCoverHeight(){
      const divider = document.querySelector('.section-divider');
      if (!divider) return;
      const y = divider.getBoundingClientRect().top + window.scrollY;
      document.documentElement.style.setProperty('--cover-height', y + 'px');
    }

    // Run as soon as DOM is parsed (before images finish loading)
    document.addEventListener('DOMContentLoaded', () => {
      setCoverHeight();                 // first pass
      requestAnimationFrame(setCoverHeight); // second pass to account for font metrics
    });

    // Keep correct on resize/zoom
    window.addEventListener('resize', setCoverHeight);
  </script>
